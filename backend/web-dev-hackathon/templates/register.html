<!-- templates/register.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register / Login</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f2f5;
            margin: 0;
        }
        .container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
            text-align: center;
            box-sizing: border-box;
        }
        h2 {
            color: #333;
            margin-bottom: 30px;
            font-size: 1.8em;
            font-weight: 600;
        }
        .role-selection {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 25px;
        }
        .role-selection label {
            background-color: #e9ecef;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s ease, box-shadow 0.3s ease;
            font-weight: 500;
            color: #495057;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .role-selection input[type="radio"] {
            display: none; /* Hide default radio button */
        }
        .role-selection input[type="radio"]:checked + label {
            background-color: #007bff;
            color: white;
            box-shadow: 0 2px 8px rgba(0,123,255,0.3);
        }
        input[type="tel"] {
            width: calc(100% - 24px);
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            box-sizing: border-box;
        }
        input[type="tel"]::placeholder {
            color: #999;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.1em;
            width: 100%;
            transition: background-color 0.3s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        button:hover {
            background-color: #45a049;
        }
        .flash-messages {
            margin-bottom: 20px;
            padding: 0;
            list-style: none;
            text-align: left;
        }
        .flash-messages li {
            background-color: #fff3e0;
            border: 1px solid #ffcc80;
            padding: 10px 15px;
            border-radius: 8px;
            color: #e65100;
            margin-bottom: 10px;
            font-size: 0.9em;
        }
        .flash-messages li.error {
            background-color: #ffebee;
            border-color: #ef9a9a;
            color: #c62828;
        }
        .flash-messages li.success {
            background-color: #e8f5e9;
            border-color: #a5d6a7;
            color: #2e7d32;
        }
        .flash-messages li.warning, .flash-messages li.info {
            background-color: #e0f2f7; /* Light blue for info/warning */
            border-color: #b3e5fc;
            color: #01579b;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Join Us!</h2>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <ul class="flash-messages">
                    {% for category, message in messages %}
                        <li class="{{ category }}">{{ message }}</li>
                    {% endfor %}
                </ul>
            {% endif %}
        {% endwith %}
        <form method="POST" action="{{ url_for('register') }}">
            <div class="role-selection">
                <input type="radio" id="roleUser" name="role" value="user" checked>
                <label for="roleUser">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-user"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    I am a User
                </label>
                <input type="radio" id="roleVendor" name="role" value="vendor">
                <label for="roleVendor">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-store"><path d="m2 7 4.41-4.41A2 2 0 0 1 7.41 2h9.18a2 2 0 0 1 1.4.59L22 7"/><path d="M4 10v7a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-7"/><path d="M9 21v-6a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v6"/></svg>
                    I am a Vendor
                </label>
            </div>
            <input type="tel" name="phone" placeholder="Enter phone number (e.g., +11234567890)" required pattern="^\+\d{10,15}$" title="Please enter a valid phone number including country code (e.g., +1234567890)">
            <button type="submit">Continue with Phone</button>
        </form>
    </div>
</body>
</html>
